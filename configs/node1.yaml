node_id: node1
raft_addr: "localhost:7000"
grpc_addr: "localhost:8000"
http_addr: "localhost:9000"
data_dir: "./data/node1"
bootstrap: true

peers:
  - id: node2
    address: "localhost:7001"
  - id: node3
    address: "localhost:7002"

snapshot_interval: 120
snapshot_threshold: 8192
heartbeat_timeout: 1000ms
election_timeout: 1000ms

auth:
  admin_tokens:
    - "admin-secret-token-change-me"
  app_keys:
    - "app-key-001"
    - "app-key-002"
